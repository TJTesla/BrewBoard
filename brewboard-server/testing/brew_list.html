<!DOCTYPE html>
<html>
    <head>
        <style>
            .button-row {
                display: flex;
                width: 100%;
                gap: 10px;
            }

            .button-row button {
                flex: 1;
                padding: 10px;
                font-size: 16px;
            }

            .bottom-space {
                margin-bottom: 20px;
            }

            .modal-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .modal-content {
            background-color: #fff;
            border-radius: 8px;

        }

            font-size: 16px;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cancel-button {
